name: YouTube Downloader Stable

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "YouTube URL"
        required: true
        type: string

      output_format:
        description: "Format"
        required: true
        type: choice
        options:
          - mp4
          - mp3
        default: mp4

      quality:
        description: "Video quality (720 or 1080) / audio bitrate"
        required: false
        default: "720"

      max_part_mb:
        description: "Split size MB (0 = no split)"
        required: false
        default: "95"

      upload_method:
        description: "Upload method"
        required: true
        type: choice
        options:
          - repository
          - release
        default: repository

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          pip install yt-dlp

      - name: Download YouTube
        id: yt
        run: |
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ github.event.inputs.output_format }}"
          QUALITY="${{ github.event.inputs.quality }}"

          mkdir -p release_files

          if [ "$FORMAT" = "mp3" ]; then
            yt-dlp -x --audio-format mp3 \
              --audio-quality 0 \
              -o "release_files/%(title)s.%(ext)s" \
              "$URL"
          else
            if [ "$QUALITY" = "1080" ]; then
              FMT="bestvideo[height<=1080]+bestaudio/best"
            else
              FMT="bestvideo[height<=720]+bestaudio/best"
            fi

            yt-dlp -f "$FMT" \
              -o "release_files/%(title)s.%(ext)s" \
              "$URL"
          fi

          FILE=$(ls release_files | head -n1)
          echo "filename=$FILE" >> $GITHUB_OUTPUT

      - name: Split large file
        run: |
          FILE="${{ steps.yt.outputs.filename }}"
          FILEPATH="release_files/$FILE"
          MAX_MB="${{ github.event.inputs.max_part_mb }}"

          if [[ "$MAX_MB" -le 0 ]]; then
            echo "Skipping split"
            exit 0
          fi

          SIZE=$(stat -c%s "$FILEPATH")
          LIMIT=$((MAX_MB * 1024 * 1024))

          if [ "$SIZE" -le "$LIMIT" ]; then
            echo "No split needed"
            exit 0
          fi

          cd release_files
          BASENAME="${FILE%.*}"
          zip -r -s "${MAX_MB}m" "${BASENAME}.zip" "$FILE"
          rm "$FILE"
          cd ..

      - name: Upload to repository
        if: github.event.inputs.upload_method == 'repository'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          mkdir -p downloads
          mv release_files/* downloads/

          git add downloads/
          git commit -m "YouTube download"
          git push

      - name: Upload release
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: yt-${{ github.run_number }}
          files: release_files/*
